services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create_multiple_dbs.sql:/docker-entrypoint-initdb.d/create_multiple_dbs.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass redis --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  mongodb:
    image: mongo:7
    container_name: mongodb
    environment:
      
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
      MONGO_INITDB_DATABASE: iam_db
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  iam-service:
    build:
      context: ./services/iam-service
      dockerfile: Dockerfile
    container_name: iam-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/iam_db
      REDIS_URL: redis://:redis@redis:6379
      NOTIFICATION_SERVICE_URL: http://notification-service:8000
      INTERNAL_SERVICE_KEY: a3f8c2e1b7d4e9f0c6a2b8d3e7f1c4a9b2d6e0f3c8a1b5d9e2f7c0a4b8d1e6
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/notification_db
      REDIS_URL: redis://:redis@redis:6379
      INTERNAL_SERVICE_KEY: a3f8c2e1b7d4e9f0c6a2b8d3e7f1c4a9b2d6e0f3c8a1b5d9e2f7c0a4b8d1e6
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    container_name: booking-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/booking_db
      REDIS_URL: redis://:redis@redis:6379
      NOTIFICATION_SERVICE_URL: http://notification-service:8000
      IAM_SERVICE_URL: http://iam-service:8000
      INTERNAL_SERVICE_KEY: a3f8c2e1b7d4e9f0c6a2b8d3e7f1c4a9b2d6e0f3c8a1b5d9e2f7c0a4b8d1e6
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      iam-service:
        condition: service_started
    restart: unless-stopped

networks:
  default:
    name: vaght-didar-network

volumes:
  postgres_data:
  redis_data:
  mongo_data: 